name: Yeti 1000X Availability Check

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Check Goal Zero Yeti 1000X availability
        id: check
        run: python check_yeti.py

      - name: Display results
        if: always()
        run: cat yeti_check_result.json

      - name: Commit and push results
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "Yeti Monitor Bot"
          git add yeti_check_history.json yeti_check_result.json
          git commit -m "Yeti inventory check: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || true
          git push

      - #name: Create issue if in stock
        name: Send Discord notification if in stock
        #if: steps.check.outputs.in_stock == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🎉 Yeti 1000X Open Box IN STOCK!',
              body: '**Goal Zero Yeti 1000X (Open Box) is available!**\n\n🔗 [Buy now](https://goalzero.com/products/yeti-1000x-open-box)\n\n⏰ ' + new Date().toISOString()
            })
