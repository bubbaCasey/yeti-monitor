name: Yeti 1000X Availability Check

on:
  schedule:
    # Run at 00:00 UTC and 12:00 UTC every day
    - cron: '0 0,12 * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  check-inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Check Goal Zero Yeti 1000X availability
        id: check
        run: |
          python check_yeti.py

      - name: Parse results
        if: always()
        run: |
          cat yeti_check_result.json

      - name: Commit and push results
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Yeti Monitor Bot"
          git add -A
          git commit -m "Yeti inventory check: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push

      - name: Create issue if in stock
        if: steps.check.outputs.in_stock == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🎉 Yeti 1000X Open Box IN STOCK',
              body: '**Goal Zero Yeti 1000X (Open Box) is available!**\n\nCheck it out: https://goalzero.com/products/yeti-1000x-open-box\n\nTime: ' + new Date().toISOString()
            })
